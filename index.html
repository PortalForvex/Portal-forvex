<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Fortix Solutions</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"><\/script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f0f0ee;--card:#ffffff;--border:#e2e0d8;--text:#1a1a18;--text2:#5a5a58;--blue:#185FA5;--blue-light:#E6F1FB;--amber:#BA7517;--amber-light:#FAEEDA;--green:#2D7D3A;--green-light:#E6F4EA;--red:#C0392B;--red-light:#FCEBEB;--radius:12px;--shadow:0 2px 12px rgba(0,0,0,0.08)}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
    .login-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:2.5rem 2rem;width:100%;max-width:400px;box-shadow:var(--shadow)}
    .login-logo{text-align:center;margin-bottom:1.75rem}
    .login-logo img{height:70px;width:auto}
    .login-title{font-size:20px;font-weight:600;text-align:center;margin-bottom:4px}
    .login-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:1.75rem}
    .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
    .field label{font-size:13px;font-weight:500;color:var(--text2)}
    .field input{font-size:14px;background:#f9f8f5;border:1px solid var(--border);border-radius:8px;padding:10px 14px;outline:none;font-family:inherit;width:100%;transition:border-color .15s}
    .field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.12);background:#fff}
    .btn-primary{width:100%;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
    .btn-primary:hover{background:#0C447C}
    .error-msg{background:var(--red-light);border:1px solid #F09595;border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-top:12px;display:none}
    .portal-wrap{display:none;min-height:100vh}
    .sidebar{position:fixed;top:0;left:0;width:240px;height:100vh;background:var(--card);border-right:1px solid var(--border);padding:1.5rem 1rem;display:flex;flex-direction:column;z-index:100}
    .sidebar-logo{margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);text-align:center}
    .sidebar-logo img{height:50px;width:auto}
    .sidebar-user{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;padding:10px;background:var(--blue-light);border-radius:8px}
    .sidebar-avatar{width:36px;height:36px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
    .sidebar-name{font-size:13px;font-weight:600;color:var(--blue)}
    .sidebar-role{font-size:11px;color:var(--text2)}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);transition:all .15s;margin-bottom:2px}
    .nav-item:hover{background:var(--bg);color:var(--text)}
    .nav-item.active{background:var(--blue-light);color:var(--blue)}
    .nav-item i{font-size:18px}
    .nav-sep{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#aaa;padding:12px 12px 6px}
    .btn-logout{margin-top:auto;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--red);border:1px solid #F09595;background:var(--red-light);font-weight:500}
    .main{margin-left:240px;padding:2rem;min-height:100vh}
    .page-title{font-size:22px;font-weight:700;margin-bottom:4px}
    .page-sub{font-size:14px;color:var(--text2);margin-bottom:1.75rem}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:1.75rem}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
    .stat-label{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
    .stat-val{font-size:28px;font-weight:700;color:var(--text)}
    .stat-icon{font-size:22px;margin-bottom:8px}
    .section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
    .section-title{font-size:15px;font-weight:600}
    .btn-sm{padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid var(--border);background:transparent;color:var(--text);transition:background .15s}
    .btn-sm:hover{background:var(--bg)}
    .btn-blue-sm{background:var(--blue);color:#fff;border-color:var(--blue)}
    .btn-blue-sm:hover{background:#0C447C;border-color:#0C447C}
    .btn-amber-sm{background:var(--amber);color:#fff;border-color:var(--amber)}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th{text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);padding:8px 12px;border-bottom:1px solid var(--border)}
    td{padding:10px 12px;border-bottom:1px solid #f0ede6;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:var(--bg)}
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
    .badge-green{background:var(--green-light);color:var(--green)}
    .badge-amber{background:var(--amber-light);color:var(--amber)}
    .badge-red{background:var(--red-light);color:var(--red)}
    .badge-blue{background:var(--blue-light);color:var(--blue)}
    .clock-display{font-size:42px;font-weight:700;color:var(--blue);text-align:center;margin:1.25rem 0;letter-spacing:2px}
    .ponto-btns{display:flex;gap:10px;justify-content:center;margin-bottom:1.25rem}
    .btn-entrada{background:var(--green);color:#fff;border:none;border-radius:8px;padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
    .btn-saida{background:var(--red);color:#fff;border:none;border-radius:8px;padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
    .btn-pausa{background:var(--amber);color:#fff;border:none;border-radius:8px;padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
    .modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center}
    .modal-card{background:var(--card);border-radius:var(--radius);padding:2rem;max-width:480px;width:90%}
    .modal-title{font-size:17px;font-weight:600;margin-bottom:1.25rem}
    .modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:1.25rem}
    textarea{width:100%;font-size:14px;background:#f9f8f5;border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:inherit;min-height:80px;resize:vertical;outline:none}
    .doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
    .doc-card{border:1px solid var(--border);border-radius:8px;padding:1rem;display:flex;flex-direction:column;gap:8px;cursor:pointer}
    .doc-card:hover{box-shadow:var(--shadow)}
    .doc-icon{font-size:28px;color:var(--blue)}
    .doc-name{font-size:14px;font-weight:600}
    .doc-date{font-size:12px;color:var(--text2)}
    .empty{text-align:center;padding:2.5rem;color:var(--text2)}
    .empty i{font-size:40px;display:block;margin-bottom:10px;opacity:.4}
    .empty p{font-size:14px}
    .hidden{display:none!important}
    @media(max-width:768px){.sidebar{transform:translateX(-100%);transition:transform .3s}.sidebar.open{transform:translateX(0)}.main{margin-left:0;padding:1.25rem}.mobile-header{display:flex;align-items:center;gap:12px;padding:1rem;background:var(--card);border-bottom:1px solid var(--border);margin:-1.25rem -1.25rem 1.25rem}.hamburger{font-size:24px;cursor:pointer}}
    @media(min-width:769px){.mobile-header{display:none}}
  </style>
</head>

        <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-label">Estado</div><div class="stat-val"><span class="badge badge-green">Ativo</span></div></div>
      </div>
      <div class="section">
        <div class="section-header"><div class="section-title">Últimos registos de ponto</div><button class="btn-sm btn-blue-sm" onclick="showPage('ponto')">Ver todos</button></div>
        <div id="dashboardPonto"><div class="empty"><i class="ti ti-clock-off"></i><p>Sem registos recentes</p></div></div>
      </div>
    </div>

    <div id="page-ponto" class="hidden">
      <div class="page-title">Folha de Ponto</div>
      <div class="page-sub">Registe as suas entradas e saídas</div>
      <div class="section">
        <div class="clock-display" id="clockDisplay">00:00:00</div>
        <div style="text-align:center;font-size:14px;color:var(--text2);margin-bottom:1.25rem;" id="clockDate">—</div>
        <div class="ponto-btns">
          <button class="btn-entrada" onclick="registarPonto('entrada')"><i class="ti ti-login"></i> Entrada</button>
          <button class="btn-pausa" onclick="registarPonto('pausa')"><i class="ti ti-coffee"></i> Pausa</button>
          <button class="btn-saida" onclick="registarPonto('saida')"><i class="ti ti-logout"></i> Saída</button>
        </div>
        <div id="pontoMsg" style="text-align:center;font-size:14px;color:var(--green);font-weight:500;min-height:20px;"></div>
      </div>
      <div class="section">
        <div class="section-header"><div class="section-title">Histórico</div></div>
        <div id="pontoHistorico"><div class="empty"><i class="ti ti-clock-off"></i><p>Sem registos</p></div></div>
      </div>
    </div>

    <div id="page-recibos" class="hidden">
      <div class="page-title">Recibos de Vencimento</div>
      <div class="page-sub">Consulte os seus recibos mensais</div>
      <div class="section"><div id="recibosLista"><div class="empty"><i class="ti ti-file-off"></i><p>Sem recibos</p></div></div></div>
    </div>

    <div id="page-documentos" class="hidden">
      <div class="page-title">Documentos da Empresa</div>
      <div class="page-sub">Regulamentos, contratos e outros documentos</div>
      <div class="section"><div class="doc-grid" id="docsGrid"><div class="empty"><i class="ti ti-folder-off"></i><p>Sem documentos</p></div></div></div>
    </div>

    <div id="page-ficha" class="hidden">
      <div class="page-title">Minha Ficha</div>
      <div class="page-sub">Os seus dados no portal</div>
      <div class="section"><div id="fichaContent"></div></div>
      <a href="https://fortix-solutions.github.io/Ficha-Colaborador-Fortix/" target="_blank" class="btn-sm btn-blue-sm" style="display:inline-flex;align-items:center;gap:6px;text-decoration:none;margin-top:1rem;"><i class="ti ti-edit"></i> Atualizar dados pessoais</a>
    </div>

    <div id="page-admin-colaboradores" class="hidden">
      <div class="page-title">Gestão de Colaboradores</div>
      <div class="page-sub">Adicione e gira os colaboradores do portal</div>
      <div class="section">
        <div class="section-header"><div class="section-title">Colaboradores</div><button class="btn-sm btn-blue-sm" onclick="showModal('modalNovoColab')">+ Novo colaborador</button></div>
        <div id="adminColabLista"><div class="empty"><i class="ti ti-users-group"></i><p>Sem colaboradores</p></div></div>
      </div>
    </div>

    <div id="page-admin-ponto" class="hidden">
      <div class="page-title">Relatório de Ponto</div>
      <div class="page-sub">Todos os registos de ponto</div>
      <div class="section"><div id="adminPontoLista"><div class="empty"><i class="ti ti-report-off"></i><p>Sem registos</p></div></div></div>
    </div>

    <div id="page-admin-recibos" class="hidden">
      <div class="page-title">Carregar Recibos</div>
      <div class="page-sub">Envie recibos para os colaboradores</div>
      <div class="section">
        <div class="field" style="max-width:320px;"><label class="section-title" style="font-size:13px;">Colaborador</label><select id="reciboColab"></select></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:300px;margin:12px 0;">
          <div class="field"><label class="section-title" style="font-size:13px;">Mês</label><select id="reciboMes"><option>Janeiro</option><option>Fevereiro</option><option>Março</option><option>Abril</option><option selected>Maio</option><option>Junho</option><option>Julho</option><option>Agosto</option><option>Setembro</option><option>Outubro</option><option>Novembro</option><option>Dezembro</option></select></div>
          <div class="field"><label class="section-title" style="font-size:13px;">Ano</label><input type="number" id="reciboAno" value="2026" min="2020" max="2099" /></div>
        </div>
        <div class="field" style="max-width:400px;"><label class="section-title" style="font-size:13px;">Link do recibo (Google Drive, etc.)</label><input type="text" id="reciboUrl" placeholder="https://drive.google.com/..." /></div>
        <button class="btn-sm btn-blue-sm" onclick="carregarRecibo()">Carregar recibo</button>
        <div id="reciboMsg" style="margin-top:10px;font-size:13px;"></div>
      </div>
    </div>

    <div id="page-admin-docs" class="hidden">
      <div class="page-title">Publicar Documentos</div>
      <div class="page-sub">Partilhe documentos com todos os colaboradores</div>
      <div class="section">
        <div class="field" style="max-width:400px;"><label class="section-title" style="font-size:13px;">Título</label><input type="text" id="docTitulo" placeholder="Ex: Regulamento Interno" /></div>
        <div class="field" style="max-width:400px;"><label class="section-title" style="font-size:13px;">Descrição</label><textarea id="docDesc" placeholder="Breve descrição..." style="min-height:60px;"></textarea></div>
        <div class="field" style="max-width:400px;"><label class="section-title" style="font-size:13px;">Link do documento</label><input type="text" id="docUrl" placeholder="https://drive.google.com/..." /></div>
        <button class="btn-sm btn-blue-sm" onclick="publicarDoc()">Publicar documento</button>
        <div id="docMsg" style="margin-top:10px;font-size:13px;"></div>
      </div>
    </div>

  </div>
</div>

<div class="modal-bg" id="modalNovoColab">
  <div class="modal-card">
    <div class="modal-title">Novo Colaborador</div>
    <div class="field"><label>Nome completo</label><input type="text" id="newNome" placeholder="João Silva" /></div>
    <div class="field"><label>Email</label><input type="email" id="newEmail" placeholder="joao@fortix.pt" /></div>
    <div class="field"><label>Senha inicial</label><input type="password" id="newSenha" placeholder="Mínimo 6 caracteres" /></div>
    <div class="field"><label>Cargo</label><input type="text" id="newCargo" placeholder="Ex: Técnico" /></div>
    <div class="field"><label>Departamento</label><input type="text" id="newDepto" placeholder="Ex: Operações" /></div>
    <div style="display:flex;align-items:center;gap:8px;margin:8px 0;"><input type="checkbox" id="newIsAdmin" style="width:16px;height:16px;" /><label style="font-size:13px;font-weight:500;">É administrador?</label></div>
    <div id="newColabMsg" style="font-size:13px;color:var(--red);min-height:20px;"></div>
    <div class="modal-btns">
      <button class="btn-sm" onclick="closeModal('modalNovoColab')">Cancelar</button>
      <button class="btn-sm btn<script>
  const SUPABASE_URL = 'https://wbriqlcqfgnpjbxesmdc.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_T2GYe2-5dVrXLWZasUzPZQ_DnS7k-27';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  let currentUser = null, clockInterval = null;

  async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pwd   = document.getElementById('loginPassword').value;
    const err   = document.getElementById('loginError');
    err.style.display = 'none';
    if (!email || !pwd) { err.textContent='Preencha email e senha.'; err.style.display='block'; return; }
    const { data, error } = await sb.from('colaboradores').select('*').eq('email',email).eq('senha',pwd).eq('ativo',true).single();
    if (error || !data) { err.style.display='block'; return; }
    currentUser = data;
    localStorage.setItem('fortix_user', JSON.stringify(data));
    iniciarPortal();
  }

  function doLogout() {
    currentUser = null;
    localStorage.removeItem('fortix_user');
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('portalWrap').style.display = 'none';
    if (clockInterval) clearInterval(clockInterval);
  }

  function iniciarPortal() {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('portalWrap').style.display = 'flex';
    const u = currentUser;
    document.getElementById('sidebarAvatar').textContent = u.nome.charAt(0).toUpperCase();
    document.getElementById('sidebarName').textContent   = u.nome;
    document.getElementById('sidebarRole').textContent   = u.cargo || 'Colaborador';
    document.getElementById('dashboardSub').textContent  = 'Olá, ' + u.nome + '! Bem-vindo ao portal Fortix.';
    if (u.is_admin) document.getElementById('adminNav').classList.remove('hidden');
    startClock(); showPage('dashboard'); loadDashboard();
  }

  function startClock() {
    function tick() {
      const now = new Date();
      const el = document.getElementById('clockDisplay');
      const de = document.getElementById('clockDate');
      if (el) el.textContent = now.toLocaleTimeString('pt-PT');
      if (de) de.textContent = now.toLocaleDateString('pt-PT',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    }
    tick(); clockInterval = setInterval(tick, 1000);
  }

  function showPage(page) {
    document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const el = document.getElementById('page-'+page);
    if (el) el.classList.remove('hidden');
    const nav = document.getElementById('nav-'+page);
    if (nav) nav.classList.add('active');
    if (page==='ponto') loadPonto();
    if (page==='recibos') loadRecibos();
    if (page==='documentos') loadDocs();
    if (page==='ficha') loadFicha();
    if (page==='admin-colaboradores') loadAdminColab();
    if (page==='admin-ponto') loadAdminPonto();
    if (page==='admin-recibos') loadAdminReciboForm();
    if (page==='dashboard') loadDashboard();
    document.getElementById('sidebar').classList.remove('open');
  }

  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

  async function loadDashboard() {
    const { count: rc } = await sb.from('recibos').select('*',{count:'exact',head:true}).eq('colaborador_id',currentUser.id);
    const { count: dc } = await sb.from('documentos').select('*',{count:'exact',head:true});
    document.getElementById('statRecibos').textContent = rc || 0;
    document.getElementById('statDocs').textContent    = dc || 0;
    const { data: pontos } = await sb.from('ponto').select('*').eq('colaborador_id',currentUser.id).order('data',{ascending:false}).limit(5);
    if (pontos && pontos.length) {
      document.getElementById('dashboardPonto').innerHTML = renderPontoTable(pontos);
      document.getElementById('statHoras').textContent = pontos.length + ' reg.';
    }
  }

  async function registarPonto(tipo) {
    const now  = new Date();
    const data = now.toISOString().split('T')[0];
    const hora = now.toTimeString().split(' ')[0].substring(0,5);
    const msg  = document.getElementById('pontoMsg');
    const { data: existing } = await sb.from('ponto').select('*').eq('colaborador_id',currentUser.id).eq('data',data).single();
    if (tipo==='entrada' && !existing) {
      await sb.from('ponto').insert({ colaborador_id:currentUser.id, data, entrada:hora });
      msg.textContent = '✅ Entrada registada às ' + hora;
    } else if (tipo==='saida' && existing) {
      await sb.from('ponto').update({ saida:hora }).eq('id',existing.id);
      msg.textContent = '✅ Saída registada às ' + hora;
    } else if (tipo==='pausa' && existing) {
      if (!existing.pausa_inicio) {
        await sb.from('ponto').update({ pausa_inicio:hora }).eq('id',existing.id);
        msg.textContent = '⏸ Pausa iniciada às ' + hora;
      } else {
        await sb.from('ponto').update({ pausa_fim:hora }).eq('id',existing.id);
        msg.textContent = '▶ Pausa terminada às ' + hora;
      }
    } else {
      msg.textContent = tipo==='entrada' ? '⚠️ Entrada já registada hoje' : '⚠️ Registe primeiro a entrada';
    }
    setTimeout(()=>{ msg.textContent=''; }, 4000);
    loadPonto();
  }

  async function loadPonto() {
    const { data } = await sb.from('ponto').select('*').eq('colaborador_id',currentUser.id).order('data',{ascending:false}).limit(20);
    const el = document.getElementById('pontoHistorico');
    el.innerHTML = data && data.length ? renderPontoTable(data) : '<div class="empty"><i class="ti ti-clock-off"></i><p>Sem registos</p></div>';
  }

  function renderPontoTable(rows) {
    return '<table><thead><tr><th>Data</th><th>Entrada</th><th>Pausa início</th><th>Pausa fim</th><th>Saída</th></tr></thead><tbody>'+
      rows.map(r=>'<tr><td>'+r.data+'</td><td>'+(r.entrada||'—')+'</td><td>'+(r.pausa_inicio||'—')+'</td><td>'+(r.pausa_fim||'—')+'</td><td>'+(r.saida||'—')+'</td></tr>').join('')+
      '</tbody></table>';
  }

  async function loadRecibos() {
    const { data } = await sb.from('recibos').select('*').eq('colaborador_id',currentUser.id).order('ano',{ascending:false});
    const el = document.getElementById('recibosLista');
    if (!data||!data.length) { el.innerHTML='<div class="empty"><i class="ti ti-file-off"></i><p>Sem recibos</p></div>'; return; }
    el.innerHTML='<table><thead><tr><th>Mês</th><th>Ano</th><th>Ficheiro</th></tr></thead><tbody>'+
      data.map(r=>'<tr><td>'+r.mes+'</td><td>'+r.ano+'</td><td>'+(r.ficheiro_url?'<a href="'+r.ficheiro_url+'" target="_blank" class="btn-sm btn-blue-sm" style="text-decoration:none;"><i class="ti ti-download"></i> Abrir</a>':'—')+'</td></tr>').join('')+
      '</tbody></table>';
  }

  async function loadDocs() {
    const { data } = await sb.from('documentos').select('*').order('criado_em',{ascending:false});
    const el = document.getElementById('docsGrid');
    if (!data||!data.length) { el.innerHTML='<div class="empty"><i class="ti ti-folder-off"></i><p>Sem documentos</p></div>'; return; }
    el.innerHTML=data.map(d=>'<div class="doc-card" onclick="window.open(\''+d.ficheiro_url+'\',\'_blank\')"><div class="doc-icon"><i class="ti ti-file-description"></i></div><div class="doc-name">'+d.titulo+'</div><div class="doc-date">'+(d.descricao||'')+'</div></div>').join('');
  }

  async function loadFicha() {
    const u = currentUser;
    document.getElementById('fichaContent').innerHTML=
      '<table><tbody>'+
      ['Nome','Email','Cargo','Departamento','Data admissão'].map((l,i)=>{
        const vals=[u.nome,u.email,u.cargo,u.departamento,u.data_admissao];
        return '<tr><td style="color:var(--text2);font-size:13px;padding:8px 12px;font-weight:500;white-space:nowrap;">'+l+'</td><td style="padding:8px 12px;">'+(vals[i]||'—')+'</td></tr>';
      }).join('')+'</tbody></table>';
  }

  async function loadAdminColab() {
    const { data } = await sb.from('colaboradores').select('*').order('nome');
    const el = document.getElementById('adminColabLista');
    if (!data||!data.length) { el.innerHTML='<div class="empty"><i class="ti ti-users-group"></i><p>Sem colaboradores</p></div>'; return; }
    el.innerHTML='<table><thead><tr><th>Nome</th><th>Email</th><th>Cargo</th><th>Dept.</th><th>Admin</th><th>Estado</th></tr></thead><tbody>'+
      data.map(c=>'<tr><td><strong>'+c.nome+'</strong></td><td>'+c.email+'</td><td>'+(c.cargo||'—')+'</td><td>'+(c.departamento||'—')+'</td><td>'+(c.is_admin?'<span class="badge badge-amber">Sim</span>':'Não')+'</td><td>'+(c.ativo?'<span class="badge badge-green">Ativo</span>':'<span class="badge badge-red">Inativo</span>')+'</td></tr>').join('')+
      '</tbody></table>';
  }

  async function criarColaborador() {
    const nome=document.getElementById('newNome').value.trim();
    const email=document.getElementById('newEmail').value.trim();
    const senha=document.getElementById('newSenha').value;
    const cargo=document.getElementById('newCargo').value.trim();
    const depto=document.getElementById('newDepto').value.trim();
    const isAdm=document.getElementById('newIsAdmin').checked;
    const msg=document.getElementById('newColabMsg');
    if (!nome||!email||!senha) { msg.textContent='Nome, email e senha são obrigatórios.'; return; }
    const { error } = await sb.from('colaboradores').insert({ nome, email, senha, cargo, departamento:depto, is_admin:isAdm });
    if (error) { msg.textContent='Erro: '+(error.message||'email já existe'); return; }
    closeModal('modalNovoColab');
    ['newNome','newEmail','newSenha','newCargo','newDepto'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('newIsAdmin').checked=false;
    loadAdminColab();
  }

  async function loadAdminPonto() {
    const { data } = await sb.from('ponto').select('*, colaboradores(nome)').order('data',{ascending:false}).limit(50);
    const el = document.getElementById('adminPontoLista');
    if (!data||!data.length) { el.innerHTML='<div class="empty"><i class="ti ti-report-off"></i><p>Sem registos</p></div>'; return; }
    el.innerHTML='<table><thead><tr><th>Colaborador</th><th>Data</th><th>Entrada</th><th>Pausa início</th><th>Pausa fim</th><th>Saída</th></tr></thead><tbody>'+
      data.map(r=>'<tr><td>'+(r.colaboradores?.nome||'—')+'</td><td>'+r.data+'</td><td>'+(r.entrada||'—')+'</td><td>'+(r.pausa_inicio||'—')+'</td><td>'+(r.pausa_fim||'—')+'</td><td>'+(r.saida||'—')+'</td></tr>').join('')+
      '</tbody></table>';
  }

  async function loadAdminReciboForm() {
    const { data } = await sb.from('colaboradores').select('id,nome').order('nome');
    const sel = document.getElementById('reciboColab');
    sel.innerHTML = (data||[]).map(c=>'<option value="'+c.id+'">'+c.nome+'</option>').join('');
  }

  async function carregarRecibo() {
    const cid=document.getElementById('reciboColab').value;
    const mes=document.getElementById('reciboMes').value;
    const ano=parseInt(document.getElementById('reciboAno').value);
    const url=document.getElementById('reciboUrl').value.trim();
    const msg=document.getElementById('reciboMsg');
    if (!url) { msg.style.color='var(--red)'; msg.textContent='Introduza o link do recibo.'; return; }
    const { error } = await sb.from('recibos').insert({ colaborador_id:cid, mes, ano, ficheiro_url:url });
    if (error) { msg.style.color='var(--red)'; msg.textContent='Erro: '+error.message; return; }
    msg.style.color='var(--green)'; msg.textContent='✅ Recibo carregado!';
    document.getElementById('reciboUrl').value='';
    setTimeout(()=>{ msg.textContent=''; }, 3000);
  }

  async function publicarDoc() {
    const titulo=document.getElementById('docTitulo').value.trim();
    const desc=document.getElementById('docDesc').value.trim();
    const url=document.getElementById('docUrl').value.trim();
    const msg=document.getElementById('docMsg');
    if (!titulo||!url) { msg.style.color='var(--red)'; msg.textContent='Título e link são obrigatórios.'; return; }
    const { error } = await sb.from('documentos').insert({ titulo, descricao:desc, ficheiro_url:url, para_todos:true });
    if (error) { msg.style.color='var(--red)'; msg.textContent='Erro: '+error.message; return; }
    msg.style.color='var(--green)'; msg.textContent='✅ Documento publicado!';
    ['docTitulo','docDesc','docUrl'].forEach(id=>document.getElementById(id).value='');
    setTimeout(()=>{ msg.textContent=''; }, 3000);
  }

  function showModal(id) { document.getElementById(id).style.display='flex'; }
  function closeModal(id) { document.getElementById(id).style.display='none'; }
  document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{ if(e.target===m) m.style.display='none'; }));

  (function() {
    const saved = localStorage.getItem('fortix_user');
    if (saved) { try { currentUser=JSON.parse(saved); iniciarPortal(); } catch(e) {} }
  })();
</script>
</body>
</html>
